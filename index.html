<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>弈秋 - 五子棋</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap');
    
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'ZCOOL XiaoWei', 'Kaiti', '楷体', serif;
      background: linear-gradient(135deg, #f5e6d3 0%, #e8d4b8 50%, #d4c4a8 100%);
      background-attachment: fixed;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(139, 90, 43, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, rgba(139, 90, 43, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    
    .container {
      position: relative;
      z-index: 1;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px;
    }
    
    h1 {
      color: #5d3a1a;
      margin: 10px 0 15px 0;
      font-size: 36px;
      font-family: 'Ma Shan Zheng', 'STXingkai', '华文行楷', cursive;
      text-shadow: 2px 2px 4px rgba(93, 58, 26, 0.2);
      letter-spacing: 8px;
      border-bottom: 2px solid #8b5a2b;
      padding-bottom: 10px;
    }
    
    .mode-select {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .mode-btn {
      padding: 12px 30px;
      font-size: 18px;
      font-family: 'ZCOOL XiaoWei', 'Kaiti', serif;
      border: 2px solid #8b5a2b;
      border-radius: 5px;
      cursor: pointer;
      background: linear-gradient(180deg, #f9f3e8 0%, #e8d4b8 100%);
      color: #5d3a1a;
      transition: all 0.3s;
      position: relative;
      letter-spacing: 2px;
    }
    
    .mode-btn::before,
    .mode-btn::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      border: 2px solid #8b5a2b;
      transition: all 0.3s;
    }
    
    .mode-btn::before {
      top: -2px;
      left: -2px;
      border-right: none;
      border-bottom: none;
    }
    
    .mode-btn::after {
      bottom: -2px;
      right: -2px;
      border-left: none;
      border-top: none;
    }
    
    .mode-btn:hover {
      background: linear-gradient(180deg, #fff9f0 0%, #f0dbb8 100%);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(93, 58, 26, 0.2);
    }
    
    .mode-btn.active {
      background: linear-gradient(180deg, #8b5a2b 0%, #5d3a1a 100%);
      color: #f9f3e8;
      border-color: #5d3a1a;
    }
    
    .mode-btn.active::before,
    .mode-btn.active::after {
      border-color: #5d3a1a;
    }
    
    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(180deg, #f5e6d3 0%, #e8d4b8 50%, #f5e6d3 100%);
      border: 3px solid #8b5a2b;
      border-radius: 8px;
      padding: 25px;
      box-shadow: 
        0 0 0 2px #c9a86c,
        0 10px 30px rgba(93, 58, 26, 0.3),
        inset 0 0 20px rgba(139, 90, 43, 0.1);
      max-width: 100%;
      position: relative;
    }
    
    .game-wrapper::before,
    .game-wrapper::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 110%;
      height: 20px;
      background: linear-gradient(90deg, #8b5a2b 0%, #5d3a1a 50%, #8b5a2b 100%);
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    
    .game-wrapper::before { top: -12px; }
    .game-wrapper::after { bottom: -12px; }
    
    .progress-container {
      width: 100%;
      max-width: 450px;
      margin-bottom: 15px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .progress-container.show { opacity: 1; }
    
    .progress-label {
      text-align: center;
      color: #5d3a1a;
      font-size: 16px;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    
    .progress-bar {
      width: 100%;
      height: 20px;
      background: #d4c4a8;
      border: 2px solid #8b5a2b;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #c9a86c 0%, #8b5a2b 50%, #c9a86c 100%);
      background-size: 200% 100%;
      animation: progressGlow 1.5s ease-in-out infinite;
      border-radius: 8px;
      transition: width 0.1s linear;
    }
    
    @keyframes progressGlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    .progress-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #5d3a1a;
      font-size: 12px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
    }
    
    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      font-size: 14px;
      color: #8b5a2b;
    }
    
    .time-estimate {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .time-estimate-icon {
      font-size: 16px;
    }
    
    .phase-indicator {
      text-align: center;
      font-size: 14px;
      color: #8b5a2b;
      margin-top: 5px;
    }
    
    .board-container {
      position: relative;
      margin: 10px 0;
    }
    
    .board {
      display: flex;
      flex-direction: column;
      background-image: url('bg.jpg');
      background-size: cover;
      border: 4px solid #5d3a1a;
      border-radius: 5px;
      box-shadow: 
        inset 0 0 20px rgba(93, 58, 26, 0.3),
        0 5px 15px rgba(0, 0, 0, 0.3);
    }
    
    .board-row { display: flex; }
    
    .cell {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .cell:hover { background: rgba(139, 90, 43, 0.1); }
    
    .cell::before,
    .cell::after {
      content: "";
      position: absolute;
      background: #3d2a1a;
    }
    
    .cell::before { left: 50%; height: 100%; width: 1px; }
    .cell::after { top: 50%; width: 100%; height: 1px; }
    
    .cell.top::before { top: 50%; }
    .cell.bottom::before { bottom: 50%; }
    .cell.left::after { left: 50%; }
    .cell.right::after { right: 50%; }
    
    .cell.star-point::before {
      width: 10px;
      height: 10px;
      background: #3d2a1a;
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 3px rgba(0, 0, 0, 0.3);
    }
    
    .piece {
      width: 78%;
      height: 78%;
      border-radius: 50%;
      position: relative;
      z-index: 10;
      font-size: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 2px 3px 8px rgba(0, 0, 0, 0.4);
    }
    
    .piece.black {
      background: radial-gradient(circle at 30% 30%, #555 0%, #222 50%, #000 100%);
      color: #f0f0f0;
      border: 1px solid #111;
    }
    
    .piece.white {
      background: radial-gradient(circle at 30% 30%, #fff 0%, #eee 50%, #ccc 100%);
      color: #333;
      border: 1px solid #aaa;
    }
    
    .last-move {
      width: 25%;
      height: 25%;
      border: 2px solid #d4af37;
      z-index: 20;
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      box-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
    }
    
    .game-info {
      text-align: center;
      margin: 15px 0;
      padding: 15px 30px;
      background: linear-gradient(180deg, #f9f3e8 0%, #e8d4b8 100%);
      color: #5d3a1a;
      border: 2px solid #8b5a2b;
      border-radius: 5px;
      font-size: 18px;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 450px;
      letter-spacing: 2px;
      position: relative;
    }
    
    .game-info::before,
    .game-info::after {
      content: '◆';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: #8b5a2b;
      font-size: 14px;
    }
    
    .game-info::before { left: 15px; }
    .game-info::after { right: 15px; }
    
    .game-info.winner {
      background: linear-gradient(180deg, #ffefd5 0%, #ffe4b5 100%);
      border-color: #d4af37;
      color: #8b4513;
      font-size: 20px;
      font-weight: bold;
      animation: winnerGlow 1s ease-in-out infinite;
    }
    
    .game-info.winner::before,
    .game-info.winner::after { color: #d4af37; }
    
    @keyframes winnerGlow {
      0%, 100% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
      50% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.6); }
    }
    
    .resource-monitor {
      width: 100%;
      max-width: 450px;
      margin-top: 10px;
      padding: 10px 15px;
      background: rgba(249, 243, 232, 0.8);
      border: 1px solid #c9a86c;
      border-radius: 5px;
      display: none;
      font-size: 14px;
      color: #5d3a1a;
    }
    
    .resource-monitor.show { display: block; }
    
    .resource-row {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
    }
    
    .resource-label { font-weight: bold; }
    
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 15px;
    }
    
    .btn {
      padding: 12px 28px;
      font-size: 16px;
      font-family: 'ZCOOL XiaoWei', 'Kaiti', serif;
      border: 2px solid #8b5a2b;
      border-radius: 5px;
      cursor: pointer;
      background: linear-gradient(180deg, #f9f3e8 0%, #e8d4b8 100%);
      color: #5d3a1a;
      transition: all 0.3s;
      letter-spacing: 2px;
      position: relative;
    }
    
    .btn:hover:not(:disabled) {
      background: linear-gradient(180deg, #fff9f0 0%, #f0dbb8 100%);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(93, 58, 26, 0.3);
    }
    
    .btn:disabled {
      background: #d4c4a8;
      color: #888;
      cursor: not-allowed;
      border-color: #aaa;
    }
    
    .btn-primary {
      background: linear-gradient(180deg, #8b5a2b 0%, #5d3a1a 100%);
      color: #f9f3e8;
      border-color: #5d3a1a;
    }
    
    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(180deg, #9d6a3b 0%, #6d4a2a 100%);
    }
    
    .btn-danger {
      background: linear-gradient(180deg, #a85a5a 0%, #7a3a3a 100%);
      color: #f9f3e8;
      border-color: #7a3a3a;
    }
    
    .btn-danger:hover:not(:disabled) {
      background: linear-gradient(180deg, #b86a6a 0%, #8a4a4a 100%);
    }
    
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(61, 42, 26, 0.7);
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .modal.show { display: flex; }
    
    .modal-content {
      background: linear-gradient(180deg, #f5e6d3 0%, #e8d4b8 100%);
      border: 3px solid #8b5a2b;
      border-radius: 10px;
      padding: 30px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: modalSlideIn 0.3s ease;
      position: relative;
    }
    
    .modal-content::before,
    .modal-content::after {
      content: '';
      position: absolute;
      width: 30px;
      height: 30px;
      border: 3px solid #8b5a2b;
    }
    
    .modal-content::before {
      top: 8px;
      left: 8px;
      border-right: none;
      border-bottom: none;
    }
    
    .modal-content::after {
      bottom: 8px;
      right: 8px;
      border-left: none;
      border-top: none;
    }
    
    @keyframes modalSlideIn {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid #c9a86c;
    }
    
    .modal-header h2 {
      margin: 0;
      color: #5d3a1a;
      font-size: 24px;
      font-family: 'Ma Shan Zheng', 'STXingkai', cursive;
      letter-spacing: 4px;
    }
    
    .close-btn {
      font-size: 32px;
      font-weight: bold;
      color: #8b5a2b;
      cursor: pointer;
      line-height: 1;
      transition: all 0.3s;
    }
    
    .close-btn:hover {
      color: #5d3a1a;
      transform: scale(1.2);
    }
    
    .setting-group { margin-bottom: 25px; }
    
    .setting-group label {
      display: block;
      margin-bottom: 10px;
      font-weight: bold;
      color: #5d3a1a;
      font-size: 16px;
      letter-spacing: 2px;
    }
    
    .setting-group select {
      width: 100%;
      padding: 12px 15px;
      font-size: 16px;
      font-family: 'ZCOOL XiaoWei', 'Kaiti', serif;
      border: 2px solid #8b5a2b;
      border-radius: 5px;
      background: #f9f3e8;
      color: #5d3a1a;
      transition: all 0.3s;
      letter-spacing: 1px;
    }
    
    .setting-group select:focus {
      outline: none;
      border-color: #c9a86c;
      background: #fff9f0;
    }
    
    .setting-group input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      cursor: pointer;
      accent-color: #8b5a2b;
    }
    
    .checkbox-label {
      display: flex;
      align-items: center;
      cursor: pointer;
      padding: 10px 0;
      color: #5d3a1a;
      letter-spacing: 1px;
    }
    
    .checkbox-label:hover { color: #8b5a2b; }
    
    .modal-footer {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 2px solid #c9a86c;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    
    .debug-content {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.8;
      color: #5d3a1a;
      background: #f9f3e8;
      padding: 15px;
      border: 1px solid #c9a86c;
      border-radius: 5px;
      max-height: 400px;
      overflow-y: auto;
    }
    
    .debug-item {
      margin: 8px 0;
      padding: 8px 12px;
      background: #fff9f0;
      border-radius: 3px;
      border-left: 3px solid #8b5a2b;
    }
    
    .debug-label { font-weight: bold; color: #5d3a1a; }
    
    .footer {
      margin-top: 30px;
      color: #8b5a2b;
      opacity: 0.7;
      font-size: 14px;
      text-align: center;
      letter-spacing: 2px;
    }
    
    @media (max-width: 500px) {
      h1 { font-size: 28px; letter-spacing: 4px; }
      .mode-btn { padding: 10px 22px; font-size: 16px; }
      .game-wrapper { padding: 20px 15px; }
      .game-info { font-size: 16px; padding: 12px 20px; }
      .game-info.winner { font-size: 18px; }
      .btn { padding: 10px 20px; font-size: 14px; }
      .controls { gap: 8px; }
      .modal-content { padding: 25px 20px; }
    }
    
    @media (max-width: 360px) {
      .container { padding: 10px 5px; }
      .mode-select { gap: 8px; }
      .mode-btn { padding: 8px 16px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>弈 秋</h1>
    
    <div class="mode-select">
      <button class="mode-btn active" data-mode="pvp-ai" onclick="selectMode('pvp-ai')">人 机 对 弈</button>
      <button class="mode-btn" data-mode="ai-vs-ai" onclick="selectMode('ai-vs-ai')">AI 演 武</button>
    </div>
    
    <div class="game-wrapper">
      <div id="progress-container" class="progress-container">
        <div class="progress-label" id="progress-label">AI 深思熟虑中...</div>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
          <span id="progress-text" class="progress-text">0%</span>
        </div>
        <div class="progress-info">
          <div class="time-estimate">
            <span class="time-estimate-icon">⏱</span>
            <span>预估剩余: <span id="time-remaining">计算中...</span></span>
          </div>
          <div id="phase-indicator">阶段 1/4</div>
        </div>
      </div>
      
      <div class="board-container">
        <div id="board" class="board"></div>
      </div>
      
      <div id="game-info" class="game-info">请选择模式，点击开始对弈</div>
      
      <div id="resource-monitor" class="resource-monitor">
        <div class="resource-row">
          <span class="resource-label">思考时间:</span>
          <span id="res-time">0ms</span>
        </div>
        <div class="resource-row">
          <span class="resource-label">搜索深度:</span>
          <span id="res-depth">0 / 0 层</span>
        </div>
        <div class="resource-row">
          <span class="resource-label">迭代深度:</span>
          <span id="res-iter-depth">0 层</span>
        </div>
        <div class="resource-row">
          <span class="resource-label">搜索节点:</span>
          <span id="res-nodes">0</span>
        </div>
        <div class="resource-row">
          <span class="resource-label">节点速度:</span>
          <span id="res-speed">0 节点/秒</span>
        </div>
        <div class="resource-row">
          <span class="resource-label">缓存命中:</span>
          <span id="res-cache">0/0 (0%)</span>
        </div>
        <div class="resource-row">
          <span class="resource-label">内存占用:</span>
          <span id="res-memory">--</span>
        </div>
      </div>
      
      <div class="controls">
        <button id="btn-start" class="btn btn-primary" onclick="handleStart()">开 始</button>
        <button id="btn-stop" class="btn btn-danger" onclick="handleStop()" style="display:none;">停 止</button>
        <button id="btn-undo" class="btn" onclick="handleUndo()" disabled>悔 棋</button>
        <button id="btn-end" class="btn btn-danger" onclick="handleEnd()" disabled>认 输</button>
        <button id="btn-settings" class="btn" onclick="openSettings()">设 置</button>
        <button id="btn-debug" class="btn" onclick="openDebug()">调 试</button>
      </div>
    </div>
    
    <div class="footer">
      <p>—— 棋逢对手，将遇良才 ——</p>
    </div>
  </div>
  
  <div id="settings-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>游戏设置</h2>
        <span class="close-btn" onclick="closeSettings()">&times;</span>
      </div>
      
      <div class="setting-group">
        <label for="setting-depth">AI 棋力</label>
        <select id="setting-depth">
          <option value="2">初学乍练 (2层) - 瞬息之间</option>
          <option value="4" selected>略通皮毛 (4层) - 片刻之间</option>
          <option value="6">融会贯通 (6层) - 稍作思索</option>
          <option value="8">深不可测 (8层) - 深思熟虑</option>
        </select>
      </div>
      
      <div class="setting-group">
        <label class="checkbox-label">
          <input type="checkbox" id="setting-ai-first">
          <span>AI 执黑先行</span>
        </label>
      </div>
      
      <div class="setting-group">
        <label class="checkbox-label">
          <input type="checkbox" id="setting-show-index">
          <span>显示落子次序</span>
        </label>
      </div>
      
      <div class="setting-group">
        <label class="checkbox-label">
          <input type="checkbox" id="setting-show-resource">
          <span>显示资源监控</span>
        </label>
      </div>
      
      <div class="modal-footer">
        <button class="btn" onclick="closeSettings()">取 消</button>
        <button class="btn btn-primary" onclick="saveSettings()">确 定</button>
      </div>
    </div>
  </div>
  
  <div id="debug-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>调试信息</h2>
        <span class="close-btn" onclick="closeDebug()">&times;</span>
      </div>
      
      <div class="debug-content" id="debug-content">
        <div class="debug-item">
          <span class="debug-label">游戏状态:</span> <span id="debug-status">未开始</span>
        </div>
        <div class="debug-item">
          <span class="debug-label">当前玩家:</span> <span id="debug-player">-</span>
        </div>
        <div class="debug-item">
          <span class="debug-label">当前步数:</span> <span id="debug-moves">0</span>
        </div>
        <div class="debug-item">
          <span class="debug-label">AI 评分:</span> <span id="debug-score">0</span>
        </div>
        <div class="debug-item">
          <span class="debug-label">搜索深度:</span> <span id="debug-path-length">0</span>
        </div>
        <div class="debug-item">
          <span class="debug-label">思考路径:</span> <span id="debug-path">-</span>
        </div>
        <div class="debug-item">
          <span class="debug-label">历史记录:</span> <span id="debug-history">-</span>
        </div>
        <div class="debug-item">
          <span class="debug-label">缓存命中:</span> <span id="debug-cache-hits">-</span>
        </div>
        <div class="debug-item">
          <span class="debug-label">形状统计:</span> <span id="debug-shapes">-</span>
        </div>
      </div>
      
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="closeDebug()">关 闭</button>
      </div>
    </div>
  </div>
  
  <script src="gobang-ai.js"></script>
  <script>
    const BOARD_SIZE = 15;
    const STAR_POINTS = [
      [3, 3], [3, 7], [3, 11],
      [7, 3], [7, 7], [7, 11],
      [11, 3], [11, 7], [11, 11]
    ];
    
    let currentMode = 'pvp-ai';
    let cellSize = 30;
    let thinkStartTime = 0;
    let aiWorker = null;
    let showResourceMonitor = false;
    let workerReady = false;
    
    // 时间预估相关变量
    let timeEstimateInterval = null;
    let lastProgressUpdate = 0;
    let progressHistory = [];
    
    // 格式化时间显示
    function formatTime(ms) {
      if (ms < 1000) {
        return ms + '毫秒';
      } else if (ms < 60000) {
        return (ms / 1000).toFixed(1) + '秒';
      } else {
        const minutes = Math.floor(ms / 60000);
        const seconds = Math.round((ms % 60000) / 1000);
        return minutes + '分' + seconds + '秒';
      }
    }
    
    // 预估总节点数（基于深度和棋盘状态）
    function estimateTotalNodes(depth, moveCount) {
      // 每层的分支因子（近似值）
      const branchFactors = {
        2: 15,
        4: 18,
        6: 20,
        8: 22
      };
      
      const bf = branchFactors[depth] || 20;
      
      // 棋子越多，分支因子越小
      let adjustedBf = bf;
      if (moveCount > 10) adjustedBf *= 0.8;
      if (moveCount > 30) adjustedBf *= 0.7;
      if (moveCount > 50) adjustedBf *= 0.6;
      
      // 估算总节点数（考虑剪枝效果，实际约为理论值的30%）
      const totalNodes = Math.pow(adjustedBf, depth) * 0.3;
      
      return Math.round(totalNodes);
    }
    
    // 更新剩余时间预估（基于节点速度）
    function updateTimeEstimate(nodesSearched, nodesPerSecond, totalNodesEstimated) {
      if (nodesPerSecond > 0) {
        const remainingNodes = totalNodesEstimated - nodesSearched;
        if (remainingNodes > 0) {
          const remainingMs = (remainingNodes / nodesPerSecond) * 1000;
          document.getElementById('time-remaining').textContent = formatTime(Math.round(remainingMs));
        } else {
          document.getElementById('time-remaining').textContent = '即将完成...';
        }
      }
    }
    
    // 创建 Web Worker
    function createAIWorker() {
      const scripts = document.getElementsByTagName('script');
      let scriptPath = 'gobang-ai.js';
      
      for (let i = 0; i < scripts.length; i++) {
        if (scripts[i].src && scripts[i].src.includes('gobang-ai.js')) {
          scriptPath = scripts[i].src;
          break;
        }
      }
      
      console.log('Worker script path:', scriptPath);
      
      const workerCode = `
        let aiLoaded = false;
        
        self.onmessage = function(e) {
          if (e.data.type === 'init') {
            try {
              importScripts(e.data.aiScript);
              aiLoaded = true;
              self.postMessage({ type: 'ready' });
              console.log('AI script loaded successfully');
            } catch (err) {
              console.error('Failed to load AI script:', err);
              self.postMessage({ type: 'error', data: err.message });
            }
          } else if (e.data.type === 'compute') {
            if (!aiLoaded) {
              self.postMessage({ type: 'error', data: 'AI not loaded yet' });
              return;
            }
            
            try {
              const boardData = e.data.board;
              const depth = e.data.depth;
              
              const board = Board.fromJSON(boardData);
              
              setProgressCallback((progress) => {
                self.postMessage({ type: 'progress', data: progress });
              });
              
              const result = minmax(board, board.role, depth, true);
              
              self.postMessage({
                type: 'result',
                data: {
                  score: result[0],
                  move: result[1],
                  path: result[2],
                  cacheHits: cache_hits.hit,
                  cacheTotal: cache_hits.total,
                  searchNodes: cache_hits.search
                }
              });
            } catch (err) {
              console.error('Compute error:', err);
              self.postMessage({ type: 'error', data: err.message });
            }
          }
        };
      `;
      
      const blob = new Blob([workerCode], { type: 'application/javascript' });
      const workerUrl = URL.createObjectURL(blob);
      const worker = new Worker(workerUrl);
      
      return { worker, scriptPath };
    }
    
    function initAIWorker() {
      if (aiWorker) {
        aiWorker.terminate();
      }
      
      workerReady = false;
      const { worker, scriptPath } = createAIWorker();
      aiWorker = worker;
      
      aiWorker.onmessage = function(e) {
        if (e.data.type === 'ready') {
          workerReady = true;
          console.log('Worker is ready');
        } else if (e.data.type === 'progress') {
          updateProgressFromWorker(e.data.data);
        } else if (e.data.type === 'result') {
          handleAIResult(e.data.data);
        } else if (e.data.type === 'error') {
          console.error('Worker error:', e.data.data);
          stopProgress();
          gameState.loading = false;
          renderBoard();
          alert('AI计算出错: ' + e.data.data);
        }
      };
      
      aiWorker.onerror = function(error) {
        console.error('Worker error:', error);
        stopProgress();
        gameState.loading = false;
        renderBoard();
      };
      
      aiWorker.postMessage({
        type: 'init',
        aiScript: scriptPath
      });
    }
    
    function updateProgressFromWorker(data) {
      const phaseNames = ['VCT攻击搜索', '主搜索', '反向VCT搜索', '完成'];
      const phasePercent = [25, 50, 25, 0];
      
      let totalPercent = 0;
      for (let i = 0; i < data.phase - 1; i++) {
        totalPercent += phasePercent[i];
      }
      
      const phaseProgress = Math.min(data.current / Math.max(data.total, 1), 1);
      totalPercent += phasePercent[data.phase - 1] * phaseProgress;
      
      document.getElementById('progress-fill').style.width = totalPercent + '%';
      document.getElementById('progress-text').textContent = Math.round(totalPercent) + '%';
      
      // 显示阶段信息，如果是VCT搜索则标注
      const phaseText = phaseNames[data.phase - 1] || '计算中';
      const vctIndicator = data.isVCT ? ' [VCT]' : '';
      document.getElementById('phase-indicator').textContent = 
        `阶段 ${data.phase}/4: ${phaseText}${vctIndicator}`;
      
      if (showResourceMonitor) {
        const elapsed = Date.now() - thinkStartTime;
        const nodes = data.nodes || 0;
        const cacheHits = data.cacheHits || 0;
        const cacheTotal = data.cacheTotal || 0;
        
        // 计算节点速度（节点/秒）
        const nodesPerSecond = elapsed > 0 ? Math.round(nodes / (elapsed / 1000)) : 0;
        
        // 计算缓存命中率
        const cacheHitRate = cacheTotal > 0 ? ((cacheHits / cacheTotal) * 100).toFixed(1) : 0;
        
        // 更新显示
        document.getElementById('res-time').textContent = elapsed + 'ms';
        document.getElementById('res-nodes').textContent = nodes.toLocaleString();
        document.getElementById('res-speed').textContent = nodesPerSecond.toLocaleString() + ' 节点/秒';
        document.getElementById('res-cache').textContent = `${cacheHits}/${cacheTotal} (${cacheHitRate}%)`;
        
        // 深度显示：如果是VCT搜索，显示实际深度
        if (data.isVCT) {
          document.getElementById('res-depth').textContent = `${data.currentDepth || 0} / ${data.maxDepth || 0} 层 (VCT)`;
        } else {
          document.getElementById('res-depth').textContent = `${data.currentDepth || 0} / ${data.maxDepth || 0} 层`;
        }
        document.getElementById('res-iter-depth').textContent = `${data.iterDepth || 0} 层`;
        
        // 基于节点速度预估时间
        const totalNodesEstimated = estimateTotalNodes(gameState.depth, gameState.history.length);
        updateTimeEstimate(nodes, nodesPerSecond, totalNodesEstimated);
        
        if (performance && performance.memory) {
          const used = (performance.memory.usedJSHeapSize / 1024 / 1024).toFixed(2);
          document.getElementById('res-memory').textContent = used + ' MB';
        }
      }
    }
    
    function handleAIResult(data) {
      gameState.score = data.score;
      gameState.path = data.path;
      
      if (data.move) {
        applyMove(data.move[0], data.move[1]);
      }
      
      gameState.loading = false;
      stopProgress();
      renderBoard();
      
      if (gameState.aiVsAi && !gameState.winner && gameState.status === STATUS.GAMING) {
        scheduleNextAIMove();
      }
    }
    
    function scheduleNextAIMove() {
      setTimeout(() => {
        if (gameState.aiVsAi && !gameState.winner && gameState.status === STATUS.GAMING) {
          requestAIMove();
        }
      }, 500);
    }
    
    function requestAIMove() {
      if (!aiWorker || !workerReady) {
        console.log('Worker not ready, reinitializing...');
        initAIWorker();
        setTimeout(() => {
          if (workerReady) {
            requestAIMove();
          } else {
            console.error('Worker failed to initialize');
            gameState.loading = false;
            renderBoard();
          }
        }, 200);
        return;
      }
      
      gameState.loading = true;
      startProgress();
      renderBoard();
      
      aiWorker.postMessage({
        type: 'compute',
        board: gameBoard.toJSON(),
        depth: gameState.depth
      });
    }
    
    function initBoard() {
      const maxWidth = Math.min(window.innerWidth - 60, 450);
      cellSize = Math.floor(maxWidth / BOARD_SIZE);
      
      const board = document.getElementById('board');
      board.style.width = cellSize * BOARD_SIZE + 'px';
      board.style.height = cellSize * BOARD_SIZE + 'px';
      
      renderBoard();
    }
    
    function isStarPoint(x, y) {
      return STAR_POINTS.some(p => p[0] === x && p[1] === y);
    }
    
    function startProgress() {
      thinkStartTime = Date.now();
      progressHistory = [];
      
      document.getElementById('progress-container').classList.add('show');
      document.getElementById('progress-fill').style.width = '0%';
      document.getElementById('progress-text').textContent = '0%';
      document.getElementById('phase-indicator').textContent = '阶段 1/4: 初始化';
      document.getElementById('time-remaining').textContent = '计算中...';
      
      if (showResourceMonitor) {
        document.getElementById('resource-monitor').classList.add('show');
        document.getElementById('res-speed').textContent = '0 节点/秒';
        document.getElementById('res-cache').textContent = '0/0 (0%)';
      }
      
      // 启动时间更新定时器
      if (timeEstimateInterval) {
        clearInterval(timeEstimateInterval);
      }
      timeEstimateInterval = setInterval(() => {
        if (gameState.loading) {
          const elapsed = Date.now() - thinkStartTime;
          document.getElementById('res-time').textContent = elapsed + 'ms';
        }
      }, 100);
    }
    
    function stopProgress() {
      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('progress-text').textContent = '100%';
      document.getElementById('time-remaining').textContent = '已完成';
      
      if (timeEstimateInterval) {
        clearInterval(timeEstimateInterval);
        timeEstimateInterval = null;
      }
      
      setTimeout(() => {
        document.getElementById('progress-container').classList.remove('show');
        if (!showResourceMonitor) {
          document.getElementById('resource-monitor').classList.remove('show');
        }
      }, 300);
    }
    
    function renderBoard() {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';
      
      for (let i = 0; i < BOARD_SIZE; i++) {
        const rowEl = document.createElement('div');
        rowEl.className = 'board-row';
        
        for (let j = 0; j < BOARD_SIZE; j++) {
          const cellEl = document.createElement('div');
          let cellClass = 'cell';
          
          if (i === 0) cellClass += ' top';
          if (i === BOARD_SIZE - 1) cellClass += ' bottom';
          if (j === 0) cellClass += ' left';
          if (j === BOARD_SIZE - 1) cellClass += ' right';
          if (isStarPoint(i, j)) cellClass += ' star-point';
          
          cellEl.className = cellClass;
          cellEl.style.width = cellSize + 'px';
          cellEl.style.height = cellSize + 'px';
          cellEl.onclick = () => handlePlayerMove(i, j);
          
          if (gameBoard) {
            const cellValue = gameBoard.board[i][j];
            if (cellValue !== 0) {
              const pieceEl = document.createElement('div');
              pieceEl.className = 'piece ' + (cellValue === 1 ? 'black' : 'white');
              
              if (gameState.showIndex) {
                for (let k = 0; k < gameState.history.length; k++) {
                  if (gameState.history[k].x === i && gameState.history[k].y === j) {
                    pieceEl.textContent = k + 1;
                    break;
                  }
                }
              }
              
              cellEl.appendChild(pieceEl);
              
              if (gameState.history.length > 0) {
                const lastMove = gameState.history[gameState.history.length - 1];
                if (lastMove.x === i && lastMove.y === j) {
                  const lastEl = document.createElement('div');
                  lastEl.className = 'last-move';
                  cellEl.appendChild(lastEl);
                }
              }
            }
          }
          
          rowEl.appendChild(cellEl);
        }
        
        boardEl.appendChild(rowEl);
      }
      
      updateGameInfo();
      updateControls();
      updateDebugInfo();
    }
    
    function updateGameInfo() {
      const infoEl = document.getElementById('game-info');
      
      if (gameState.winner) {
        infoEl.className = 'game-info winner';
        const winnerText = gameState.winner === 1 ? '黑 棋' : '白 棋';
        infoEl.textContent = `恭 喜！${winnerText} 获 胜！`;
      } else if (gameState.status === STATUS.GAMING) {
        infoEl.className = 'game-info';
        if (gameState.aiVsAi) {
          infoEl.textContent = 'AI 演 武 进 行 中...';
        } else {
          const playerText = gameState.currentPlayer === 1 ? '黑 棋' : '白 棋';
          infoEl.textContent = `${playerText} 轮 到 你 了`;
        }
      } else {
        infoEl.className = 'game-info';
        if (currentMode === 'pvp-ai') {
          infoEl.textContent = '请点击"开始"进行对弈';
        } else {
          infoEl.textContent = '请点击"开始"观看AI演武';
        }
      }
    }
    
    function updateControls() {
      const isPvpAi = currentMode === 'pvp-ai';
      const isGaming = gameState.status === STATUS.GAMING;
      const isAiVsAi = gameState.aiVsAi;
      const hasHistory = gameState.history.length >= 2;
      
      const btnStart = document.getElementById('btn-start');
      const btnStop = document.getElementById('btn-stop');
      const btnUndo = document.getElementById('btn-undo');
      const btnEnd = document.getElementById('btn-end');
      
      btnStart.style.display = isAiVsAi ? 'none' : 'inline-block';
      btnStart.disabled = gameState.loading || isGaming;
      
      btnStop.style.display = isAiVsAi ? 'inline-block' : 'none';
      
      if (isPvpAi) {
        btnUndo.style.display = 'inline-block';
        btnUndo.disabled = gameState.loading || !isGaming || !hasHistory;
        
        btnEnd.style.display = 'inline-block';
        btnEnd.disabled = gameState.loading || !isGaming;
      } else {
        btnUndo.style.display = 'none';
        btnEnd.style.display = 'none';
      }
    }
    
    function updateDebugInfo() {
      document.getElementById('debug-status').textContent = 
        gameState.status === STATUS.GAMING ? '游戏中' : '空闲';
      document.getElementById('debug-player').textContent = 
        gameState.currentPlayer === 1 ? '黑棋' : (gameState.currentPlayer === -1 ? '白棋' : '-');
      document.getElementById('debug-moves').textContent = gameState.history.length;
      document.getElementById('debug-score').textContent = gameState.score;
      document.getElementById('debug-path-length').textContent = gameState.path?.length || 0;
      document.getElementById('debug-path').textContent = 
        gameState.path?.length > 0 ? JSON.stringify(gameState.path) : '-';
      document.getElementById('debug-history').textContent = 
        gameState.history.length > 0 ? JSON.stringify(gameState.history.map(h => [h.x, h.y])) : '-';
      document.getElementById('debug-cache-hits').textContent = 
        `搜索: ${cache_hits.search}, 命中: ${cache_hits.hit}, 总计: ${cache_hits.total}`;
      document.getElementById('debug-shapes').textContent = 
        `五连:${shapePerformance.five} 四连:${shapePerformance.four} 四连(堵):${shapePerformance.blockFour} 三连:${shapePerformance.three} 三连(堵):${shapePerformance.blockThree} 两连:${shapePerformance.two}`;
    }
    
    function selectMode(mode) {
      if (gameState.status === STATUS.GAMING && !confirm('切换模式将结束当前游戏，确定吗？')) {
        return;
      }
      
      stopAiVsAi();
      gameState.status = STATUS.IDLE;
      gameState.aiVsAi = false;
      currentMode = mode;
      
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
      
      renderBoard();
    }
    
    function handleStart() {
      if (currentMode === 'pvp-ai') {
        startGameWithWorker();
      } else {
        startAiVsAiWithWorker();
      }
    }
    
    function startGameWithWorker() {
      gameBoard = new Board(board_size, 1);
      gameState.status = STATUS.GAMING;
      gameState.currentPlayer = 1;
      gameState.winner = null;
      gameState.history = [];
      gameState.score = 0;
      gameState.path = [];
      gameState.aiVsAi = false;
      renderBoard();

      if (gameState.aiFirst) {
        requestAIMove();
      }
    }
    
    function startAiVsAiWithWorker() {
      gameBoard = new Board(board_size, 1);
      gameState.status = STATUS.GAMING;
      gameState.currentPlayer = 1;
      gameState.winner = null;
      gameState.history = [];
      gameState.score = 0;
      gameState.path = [];
      gameState.aiVsAi = true;
      renderBoard();
      
      requestAIMove();
    }
    
    function handlePlayerMove(x, y) {
      if (gameState.aiVsAi) return;
      if (gameState.status !== STATUS.GAMING || gameState.loading) return;
      if (gameBoard.board[x][y] !== 0) return;
      
      applyMove(x, y);
      renderBoard();

      if (!gameState.winner && gameState.status === STATUS.GAMING) {
        requestAIMove();
      }
    }
    
    function handleStop() {
      stopAiVsAi();
    }
    
    function handleUndo() {
      undoMove();
    }
    
    function handleEnd() {
      if (confirm('确定要认输吗？')) {
        gameState.winner = gameState.currentPlayer === 1 ? -1 : 1;
        gameState.status = STATUS.IDLE;
        renderBoard();
      }
    }
    
    function openSettings() {
      document.getElementById('setting-depth').value = gameState.depth;
      document.getElementById('setting-ai-first').checked = gameState.aiFirst;
      document.getElementById('setting-show-index').checked = gameState.showIndex;
      document.getElementById('setting-show-resource').checked = showResourceMonitor;
      document.getElementById('settings-modal').classList.add('show');
    }
    
    function closeSettings() {
      document.getElementById('settings-modal').classList.remove('show');
    }
    
    function saveSettings() {
      gameState.depth = Number(document.getElementById('setting-depth').value);
      gameState.aiFirst = document.getElementById('setting-ai-first').checked;
      gameState.showIndex = document.getElementById('setting-show-index').checked;
      showResourceMonitor = document.getElementById('setting-show-resource').checked;
      
      if (showResourceMonitor) {
        document.getElementById('resource-monitor').classList.add('show');
      } else if (!gameState.loading) {
        document.getElementById('resource-monitor').classList.remove('show');
      }
      
      closeSettings();
      renderBoard();
    }
    
    function openDebug() {
      updateDebugInfo();
      document.getElementById('debug-modal').classList.add('show');
    }
    
    function closeDebug() {
      document.getElementById('debug-modal').classList.remove('show');
    }
    
    document.querySelectorAll('.modal').forEach(modal => {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.classList.remove('show');
        }
      });
    });
    
    window.addEventListener('resize', () => {
      initBoard();
    });
    
    window.onload = () => {
      gameState.aiFirst = false;
      initBoard();
      initAIWorker();
    };
  </script>
</body>
</html>
